[package]
name = "resuma"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Resuma — the first Rust framework with SSR + Resumability + Islands + Server Actions + JS Bridge. This is the umbrella crate users depend on."
readme = "../../README.md"

[[bin]]
name = "resuma"
path = "src/bin/resuma.rs"
required-features = ["cli"]

[features]
default = ["cli"]
cli = ["dep:resuma-cli", "dep:anyhow"]

[dependencies]
resuma-core    = { workspace = true }
resuma-macros  = { workspace = true }
resuma-ssr     = { workspace = true }
resuma-server  = { workspace = true }
resuma-router  = { workspace = true }
resuma-flow    = { workspace = true }
resuma-cli     = { path = "../resuma-cli", version = "0.1.0", optional = true }
serde          = { workspace = true }
serde_json     = { workspace = true }
ctor           = "0.2"
anyhow         = { workspace = true, optional = true }